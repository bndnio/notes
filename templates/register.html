<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Notes</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; color: #111; }
    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 2rem; }
    label { display: block; margin-bottom: 1.25rem; font-size: 0.9rem; font-weight: 500; }
    input { display: block; width: 100%; margin-top: 0.25rem; padding: 0.5rem 0.6rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #333; }
    .error { color: #c00; margin-bottom: 1.25rem; min-height: 1.25rem; }
  </style>
</head>
<body>
  <h1>Register</h1>
  <p class="subtitle">Create an account to start saving notes to your Notion database.</p>
  <p class="error">{{error}}</p>
  <form method="POST" action="/register">
    <label>Email <input type="email" name="email" required autocomplete="email"></label>
    <label>Username <input type="text" name="username" required autocomplete="username" pattern="[a-z0-9_-]+" title="Lowercase letters, numbers, hyphens and underscores only"></label>
    <label>Notion Database ID <input type="text" name="notionDbId" required placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"></label>
    <label>Notion Integration Token <input type="password" name="notionToken" required placeholder="secret_…"></label>
    <button type="submit">Register</button>
  </form>
</body>
</html>
