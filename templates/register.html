<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Notes</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { max-width: 480px; margin: 3rem auto; }
    label { display: block; margin-bottom: 1.25rem; font-size: 0.9rem; font-weight: 500; }
    input { display: block; width: 100%; padding: 0.5rem 0.6rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    input[type="checkbox"] { display: inline-block; width: auto; padding: 0; border: none; border-radius: 0; }
    .error { color: #c00; margin-bottom: 1.25rem; min-height: 1.25rem; }
    .checkbox-label { display: flex; align-items: center; gap: 0.5rem; font-weight: 400; }
  </style>
</head>
<body>
  <h1>Register</h1>
  <p class="subtitle">Create an account to start capturing notes.</p>
  <p class="error">{{error}}</p>
  <form method="POST" action="/register">
    <label>
      Email
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>
      Username
      <input type="text" name="username" required autocomplete="username" pattern="[a-z0-9_-]{6,}" minlength="6" title="Lowercase letters, numbers, hyphens and underscores only (minimum 6 characters)">
      <p style="color: #888; font-size: 0.82rem; margin: 0.3rem 0 0;">Your notes address will be <code>u_username@{{emailDomain}}</code></p>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="requireSenderMatch" value="true" checked>
      Only accept emails from my registered address
    </label>
    <button type="submit" class="btn">Register</button>
  </form>
</body>
</html>
