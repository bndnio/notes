<div class="modal-overlay" id="notion-modal-overlay" onclick="if(event.target===this)closeNotionModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>Choose a database</h2>
      <button class="modal-close" onclick="closeNotionModal()">✕</button>
    </div>
    <form method="POST" action="/integration/notion/select">
      {{csrfField}}
      <div class="modal-body">
        <p class="subtitle">Select which Notion database to save notes to.</p>
        {{databases}}
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn--red">Save →</button>
        <button type="button" class="btn btn--ghost" onclick="closeNotionModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
