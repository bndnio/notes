<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Notes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page">
  {{toast}}
  {{notionModal}}
  {{mcpModal}}

  <h1>{{username}}</h1>
  <p class="subtitle"><code>{{emailAddress}}</code></p>

  <div class="status-card">
    <div class="status-card-info">
      <h3>Notion</h3>
      <p>{{notionDescription}}</p>
    </div>
    <div class="status-card-actions">
      <span class="status-badge {{notionBadgeClass}}">{{notionBadgeText}}</span>
      {{notionAction}}
    </div>
  </div>

  <div class="status-card">
    <div class="status-card-info">
      <h3>MCP Server</h3>
      <p>Connect Notes to Claude Code as an AI tool.</p>
    </div>
    <div class="status-card-actions">
      <span class="status-badge {{mcpBadgeClass}}">{{mcpBadgeText}}</span>
      <form class="form-inline" method="POST" action="/setup-mcp/generate">
        <button type="submit" class="btn">Setup →</button>
      </form>
    </div>
  </div>

  <script>
    // Toast
    const toast = document.getElementById('toast');
    if (toast) {
      setTimeout(() => toast.remove(), 5000);
      document.getElementById('toast-dismiss').addEventListener('click', () => toast.remove());
    }

    // Notion popup
    function openNotionPopup() {
      var popup = window.open('/integration/notion/connect', 'notion-oauth', 'width=600,height=700,menubar=no,toolbar=no,location=no');
      if (!popup) {
        window.location.href = '/integration/notion/connect';
        return;
      }
      var timeoutId;
      function handler(e) {
        if (e.origin !== window.location.origin) return;
        window.removeEventListener('message', handler);
        clearTimeout(timeoutId);
        if (e.data === 'notion-pending') {
          window.location.href = '/profile?modal=notion-select';
        } else if (e.data && e.data.type === 'notion-error') {
          window.location.href = '/profile?toast=' + encodeURIComponent(e.data.message);
        }
      }
      window.addEventListener('message', handler);
      timeoutId = setTimeout(function() { window.removeEventListener('message', handler); }, 300000);
    }

    // Notion database modal
    function openNotionModal() {
      document.getElementById('notion-modal-overlay').classList.add('modal-overlay--visible');
    }
    function closeNotionModal() {
      document.getElementById('notion-modal-overlay').classList.remove('modal-overlay--visible');
    }

    // Auto-open notion modal when redirected back from popup
    if (new URLSearchParams(window.location.search).get('modal') === 'notion-select') {
      openNotionModal();
    }

    // MCP modal
    function openMcpModal() {
      document.getElementById('mcp-modal-overlay').classList.add('modal-overlay--visible');
    }
    function closeMcpModal() {
      document.getElementById('mcp-modal-overlay').classList.remove('modal-overlay--visible');
    }

    // Auto-open MCP modal when redirected back from generate
    if (new URLSearchParams(window.location.search).get('modal') === 'mcp-setup') {
      openMcpModal();
    }
  </script>
</body>
</html>
