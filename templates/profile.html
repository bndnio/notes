<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Notes</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/scripts.js" defer></script>
</head>
<body>
  {{betaBanner}}
  {{toast}}
  {{notionModal}}
  {{mcpModal}}
  {{emailModal}}

  <div class="page page--wide">
    <header class="page-header">
      <h1 class="page-title">Your Profile</h1>
      <div class="profile-items">
        <div class="profile-item">
          <span class="profile-item-label">Handle</span>
          <span class="profile-item-value">{{username}}</span>
        </div>
        <div class="profile-item">
          <span class="profile-item-label">Inbound</span>
          <span class="profile-item-value">{{emailAddress}}</span>
        </div>
      </div>
    </header>

    <section class="integration-group">
      <h2>Input</h2>
      <div class="cards">
        {{emailCard}}
        {{mcpCard}}
      </div>
    </section>

    <section class="integration-group">
      <h2>Output</h2>
      <div class="cards">
        {{notionCard}}
      </div>
    </section>
  </div>

  <script>
    const toast = document.getElementById('toast');
    if (toast) {
      setTimeout(() => toast.remove(), 5000);
      document.getElementById('toast-dismiss').addEventListener('click', () => toast.remove());
    }
  </script>
  {{notionScript}}
  {{mcpScript}}
  {{emailScript}}
</body>
</html>
