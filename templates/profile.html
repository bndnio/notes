<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Notes</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/scripts.js" defer></script>
</head>
<body class="page page--wide">
  {{betaBanner}}
  {{toast}}
  {{notionModal}}
  {{mcpModal}}
  {{emailModal}}

  <h1>{{username}}</h1>
  <p class="subtitle"><code>{{emailAddress}}</code></p>

  {{notionCard}}
  {{mcpCard}}
  {{emailCard}}

  <script>
    const toast = document.getElementById('toast');
    if (toast) {
      setTimeout(() => toast.remove(), 5000);
      document.getElementById('toast-dismiss').addEventListener('click', () => toast.remove());
    }
  </script>
  {{notionScript}}
  {{mcpScript}}
  {{emailScript}}
</body>
</html>
