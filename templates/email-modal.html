<div class="modal-overlay" id="email-modal-overlay" onclick="if(event.target===this)closeEmailModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>Manage email</h2>
      <button class="modal-close" onclick="closeEmailModal()">✕</button>
    </div>
    <form id="email-settings-form" method="POST" action="/settings/email">
      {{csrfField}}
      <p class="error" id="email-form-error"></p>
      <div class="modal-body">
        <div id="email-list">{{emailList}}</div>
        <button type="button" class="btn btn--ghost btn--sm" onclick="addEmailRow()">+ Add</button>
        <label class="checkbox-label checkbox-label--spaced">
          <input type="checkbox" name="requireSenderMatch" value="1" {{requireSenderMatchChecked}}>
          Only accept notes from registered addresses
        </label>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn--red">Save →</button>
        <button type="button" class="btn btn--ghost" onclick="closeEmailModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
