<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify — Notes</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/scripts.js" defer></script>
</head>
<body class="page">
  {{betaBanner}}
  <h1>Check your email</h1>
  <p class="subtitle">We sent a 6-digit PIN to <strong>{{email}}</strong>. Enter it below.</p>
  <p class="error">{{error}}</p>
  <form method="POST" action="/verify">
    <input type="hidden" name="email" value="{{email}}">
    <label>
      PIN
      <input class="pin-input" type="text" name="pin" required inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" autofocus>
    </label>
    <button type="submit" class="btn">Verify</button>
  </form>
</body>
</html>
