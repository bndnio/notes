<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connecting…</title>
</head>
<body data-redirect-url="{{redirectUrl}}">
  <script>
    var url = document.body.dataset.redirectUrl;
    if (window.opener && !window.opener.closed) {
      window.opener.location.href = url;
      window.close();
    } else {
      window.location.href = url;
    }
  </script>
  <p>Connecting…</p>
</body>
</html>
