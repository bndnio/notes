<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Database — Notes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page">
  <h1>Choose a database</h1>
  <p class="subtitle">Select which Notion database to save notes to.</p>
  <form method="POST" action="/integration/notion/select">
    <input type="hidden" name="pickerToken" value="{{pickerToken}}">
    {{databases}}
    <button type="submit" class="btn">Connect →</button>
  </form>
</body>
</html>
