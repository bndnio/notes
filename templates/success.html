<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registered — Notes</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; color: #111; }
    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 2rem; }
    code { background: #f4f4f4; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.9em; }
    .warning { color: #c00; font-weight: 500; margin-bottom: 0.75rem; }
    .token-box { background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; word-break: break-all; font-family: monospace; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>You're registered</h1>
  <p class="subtitle">Your account is set up and ready to use.</p>
  <p class="warning">Save this MCP token now — it will not be shown again.</p>
  <div class="token-box">{{mcpToken}}</div>
  <p class="subtitle" style="margin-top: 1.25rem;">Add it to your environment as <code>NOTES_MCP_TOKEN</code> and install the MCP server from the project's <code>.mcp.json</code>.</p>
</body>
</html>
