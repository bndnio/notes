# wrangler.toml
# Cloudflare Worker configuration for notes@bndn.io capture
#
# Deploy:
#   bunx wrangler deploy
#
# First-time setup:
#   1. Generate an encryption key:    bun run gen-key
#   2. Set worker secrets:            bun run secret-encryption-key (and other secret-* scripts)
#   3. Apply D1 migrations:           bunx wrangler d1 migrations apply bndnio-notes --remote
#   4. Deploy and register at /register

name = "bndnio-notes"
main = "worker.ts"
compatibility_date = "2024-09-23"
routes = [{ pattern = "notes.bndn.io", custom_domain = true }]

[assets]
directory = "./assets"

[observability]
enabled = true

# ── R2: note storage ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "NOTES_BUCKET"
bucket_name = "bndnio-notes"

# ── Email routing ─────────────────────────────────────────────────────────────
# Route configured in Cloudflare dashboard:
#   notes.bndn.io: specific address routing (u_<username>@notes.bndn.io → this Worker)
#   bndn.io: catch-all (*@bndn.io → this Worker) for backwards compatibility

# ── D1: relational data (users, emails, notion integrations) ─────────────────
# Create with: bunx wrangler d1 create bndnio-notes
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "bndnio-notes"
database_id = "512d5056-9718-4afd-b2d0-4c6b88e6c2be"

# ── KV: short-lived ephemeral tokens (OAuth state, OTP codes) ─────────────────
# Create with: bunx wrangler kv namespace create EPHEMERAL_KV
[[kv_namespaces]]
binding = "EPHEMERAL_KV"
id = "da30844449de47bbb874342583c9c485"


# ── Vars (production defaults; local dev overrides in .dev.vars) ──────────────
[vars]
EMAIL_DOMAIN = "notes.bndn.io"
APP_URL = "https://notes.bndn.io"
NOTION_CLIENT_ID = "364d872b-594c-81b2-ab69-0037727845d4"
