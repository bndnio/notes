# wrangler.toml
# Cloudflare Worker configuration for notes@bndn.io capture
#
# Deploy:
#   bunx wrangler deploy
#
# First-time setup:
#   1. Generate an encryption key:    bun run gen-key
#   2. Store it in Secrets Store:     bun run secret-encryption-key
#   3. Add a user (all-in-one):       ENCRYPTION_KEY=<key> bun run add-user <email> <username> <notionDbId> <notionToken>
#   4. Add more emails to a user:     bun run add-email <email> <username>

name = "bndnio-notes"
main = "worker.ts"
compatibility_date = "2024-09-23"
routes = [{ pattern = "notes.bndn.io", custom_domain = true }]

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.sh", "**/*.css"]
fallthrough = false

[observability]
enabled = true

# ── R2: note storage ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "NOTES_BUCKET"
bucket_name = "bndnio-notes"

# ── Email routing ─────────────────────────────────────────────────────────────
# Route configured in Cloudflare dashboard:
#   Email → Email Routing → Routing Rules → notes@bndn.io → this Worker
[[send_email]]
name = "SEND_EMAIL"

# ── KV: hmac(mcpToken) → userId ──────────────────────────────────────────────
[[kv_namespaces]]
binding = "MCP_TOKEN_KV"
id = "dfae73f4893d406095ebb95b26e30563"

# ── KV: email or username → userId ───────────────────────────────────────────
[[kv_namespaces]]
binding = "USER_INDEX_KV"
id = "3bc2721c49b44e21bc5e028c7cef54c3"

# ── KV: user profiles (notionDbId), keyed by username ────────────────────────
[[kv_namespaces]]
binding = "PROFILE_KV"
id = "6efa814a66e041008f334fd9b83ca30f"

# ── KV: AES-GCM encrypted Notion tokens, keyed by username ───────────────────
[[kv_namespaces]]
binding = "NOTION_TOKEN_KV"
id = "9bb4ca36b284453b8899d8068f30837d"

# ── Secrets Store: AES-256 encryption key for NOTION_TOKEN_KV ────────────────
[[secrets_store_secrets]]
binding = "ENCRYPTION_KEY"
store_id = "065d291326ea4a1d8181859d83f313be"
secret_name = "ENCRYPTION_KEY"

# ── Vars ──────────────────────────────────────────────────────────────────────
[vars]
