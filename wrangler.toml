# wrangler.toml
# Cloudflare Worker configuration for notes@bndn.io capture
#
# Deploy with: bunx wrangler deploy
# Set secrets with:
#   bunx wrangler secret put NOTION_TOKEN_<USERNAME>
#   bunx wrangler secret put MCP_AUTH_TOKEN
# Add email→username entries with:
#   bunx wrangler kv key put --namespace-id=3bc2721c49b44e21bc5e028c7cef54c3 "email@example.com" "username"

name = "bndnio-notes"
main = "worker.ts"
compatibility_date = "2024-09-23"

[observability]
enabled = true

# ── R2 bucket binding ────────────────────────────────────────────────────────
# Create the bucket first: bunx wrangler r2 bucket create bndnio-notes
[[r2_buckets]]
binding = "NOTES_BUCKET"
bucket_name = "bndnio-notes"

# ── Email routing ────────────────────────────────────────────────────────────
# This tells Cloudflare this Worker handles inbound email.
# You still need to configure the route in the Cloudflare dashboard:
#   Email → Email Routing → Routing Rules → notes@bndn.io → this Worker
[[send_email]]
name = "SEND_EMAIL"

# ── KV: email → username mapping ─────────────────────────────────────────────
# Manage entries with: bunx wrangler kv key put --namespace-id=3bc2721c49b44e21bc5e028c7cef54c3 "email@example.com" "username"
[[kv_namespaces]]
binding = "SENDER_KV"
id = "3bc2721c49b44e21bc5e028c7cef54c3"

# ── Environment variables (non-secret) ──────────────────────────────────────
# Sender routes (username → config) are defined in sender-routes.ts and bundled at deploy time.
# Notion tokens are set via: bunx wrangler secret put NOTION_TOKEN_<USERNAME>
[vars]
MCP_DEFAULT_USERNAME = "brendon"
